[registry]
url = "https://api.apr.dev"

# Localnet so `anchor test` boots a local validator with all programs deployed.
# Deploy to devnet explicitly with `--provider.cluster devnet`.
[provider]
cluster = "Localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "npx ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

[test]
startup_wait = 5000

shutdown_wait = 2000

[test.validator]
# agave >= 3.x panics on the default 0.0.0.0 gossip bind; loopback works everywhere.
bind_address = "127.0.0.1"

# Ethereum-origin posted VAA (generated by scripts/generate-vaa-fixture.mjs) loaded at
# genesis so receive_announcement has a deterministic positive path on localnet.
[[test.validator.account]]
address = "ESv9V8KVyjJ1GQPWn8aCce6Q1xmdDZ4VW91cWTTFfg2A"
filename = "tests/fixtures/posted-vaa.json"

# ONS fixtures (generated by scripts/generate-ons-fixtures.mjs): posted VAAs from the
