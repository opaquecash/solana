name: Programs

on:
  push:
    branches: [main]
  pull_request:

env:
  SOLANA_VERSION: v3.1.13
  ANCHOR_VERSION: 0.32.1

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # groth16-verifier tests verify the proof fixture from circuits/
          submodules: true

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-directories: ~/.cargo/bin

      # anchor-cli links hidapi (Ledger support), which needs libudev on Linux
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/${SOLANA_VERSION}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      # Installed directly (not via avm): the avm shim resolves the CLI version
      # from each program's anchor-lang dep, which fails while the workspace
      # mixes 0.30.1 and 0.32 programs.
      - name: Install Anchor ${{ env.ANCHOR_VERSION }}
        run: |
          if ! command -v anchor >/dev/null || [ "$(anchor --version | awk '{print $2}')" != "$ANCHOR_VERSION" ]; then
            cargo install --git https://github.com/solana-foundation/anchor \
              --tag "v${ANCHOR_VERSION}" anchor-cli --locked --force
          fi
          anchor --version

      # --no-idl: anchor-syn 0.30.1 (attestation-engine-v2, schema-registry)
      # cannot compile its IDL generator under current rustc. IDLs are
      # committed; re-enable IDL build once those programs move to 0.32.
      # Native (off-chain) unit tests — verifies the real V2 proof fixture
      # against the program's hard-coded verification key via solana-bn254.
      - name: Cargo tests
        run: cargo test -p groth16-verifier

      - name: Build
        run: anchor build --no-idl

      # Integration tests (Phase 1.6) on the Anchor local validator.
      # IDLs must exist for anchor's post-test log step; --skip-build because
      # `anchor build --no-idl` already ran (plain `anchor test` would retry
      # the IDL build and fail on the 0.30.1 programs).
      - name: Integration tests
        run: |
          solana-keygen new --no-bip39-passphrase --silent || true
          npm ci
          bash scripts/generate-idls.sh
          anchor test --skip-build
